name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, e.g. v0.1.0'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: publish ${{ matrix.rid }}
    # .NET cross-publishes self-contained binaries for any RID from any host, so we build
    # every target on Linux runners (fast, always available) instead of waiting on scarce
    # macOS runners. The per-RID native libs (SDL2/OpenAL) come from NuGet, not the host.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rid: [linux-x64, win-x64, osx-x64, osx-arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Publish (self-contained)
        run: >
          dotnet publish src/Ircuitry/Ircuitry.csproj
          -c Release -r ${{ matrix.rid }}
          --self-contained true -p:PublishTrimmed=false
          -o publish/ircuitry-${{ matrix.rid }}
      - name: Keep unix launcher executable
        if: matrix.rid != 'win-x64'
        run: chmod +x publish/ircuitry-${{ matrix.rid }}/Ircuitry
      - name: Package
        run: cd publish && zip -r ../ircuitry-${{ matrix.rid }}.zip ircuitry-${{ matrix.rid }}
      - uses: actions/upload-artifact@v4
        with:
          name: ircuitry-${{ matrix.rid }}
          path: ircuitry-${{ matrix.rid }}.zip
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ircuitry ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/*.zip
          fail_on_unmatched_files: true
          generate_release_notes: true
          body: |
            ### Download & run
            Grab the zip for your OS, unzip it, and run **ircuitry** (`Ircuitry.exe` on Windows). It's
            fully self-contained, with no .NET install needed.

            - 🐧 Linux: `ircuitry-linux-x64.zip`
            - 🪟 Windows: `ircuitry-win-x64.zip`
            - 🍎 macOS Intel: `ircuitry-osx-x64.zip` · Apple Silicon: `ircuitry-osx-arm64.zip`

            Optional: install `node` and/or `python3` to use the Code node and community/custom nodes.
            On macOS, unsigned apps need `xattr -dr com.apple.quarantine ircuitry-osx-*/` (or right-click then Open).
