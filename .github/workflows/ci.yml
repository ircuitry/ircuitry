name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        run: dotnet restore src/Ircuitry/Ircuitry.csproj
      - name: Build (Release)
        run: dotnet build src/Ircuitry/Ircuitry.csproj -c Release --no-restore
      - name: Headless self-tests
        run: dotnet run --project src/Ircuitry/Ircuitry.csproj -c Release --no-build -- --selftest
