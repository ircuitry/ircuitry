# ircuitry control server - one container, persistent workspace.
#   docker compose up -d      # build + run
#   docker compose logs        # grab the admin token printed on first start
#
# Not required to use ircuitry headless: you can also run the binary directly on a box
#   ./Ircuitry --server --bind 0.0.0.0 --port 48700 --web
# and connect your desktop to it. To run it as a restart-on-reboot systemd service
# (no Docker), use deploy/install-server.sh - see deploy/ircuitry-server.service.

services:
  ircuitry:
    build: .
    image: ircuitry-server
    container_name: ircuitry
    restart: unless-stopped
    ports:
      - "48700:48700"
    volumes:
      - ircuitry-data:/data
    environment:
      IRCUITRY_PORT: "48700"
      IRCUITRY_FLAGS: "--web"        # add --no-code to refuse untrusted code on a shared host
    # ---- behind Traefik / Coolify (example labels) ----
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.ircuitry.rule=Host(`ircuitry.example.com`)"
    #   - "traefik.http.routers.ircuitry.entrypoints=websecure"
    #   - "traefik.http.routers.ircuitry.tls.certresolver=le"
    #   - "traefik.http.services.ircuitry.loadbalancer.server.port=48700"

volumes:
  ircuitry-data:
